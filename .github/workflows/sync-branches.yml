name: Sync All Branches with Main

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  sync-branches:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync branches
        run: |
          git fetch origin
          # Get all remote branches excluding HEAD and main
          branches=$(git branch -r | grep 'origin/' | grep -v 'origin/main' | grep -v 'origin/HEAD' | sed 's/origin\///')
          
          for branch in $branches; do
            echo "Attempting to sync $branch..."
            git checkout $branch
            
            if git merge origin/main --no-edit; then
              echo "Merge successful for $branch. Pushing..."
              git push origin $branch
            else
              echo "Merge conflict detected for $branch. Skipping..."
              git merge --abort
            fi
          done
