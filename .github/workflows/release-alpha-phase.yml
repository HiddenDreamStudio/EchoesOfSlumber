name: Build and Release Alpha Phase

on:
  workflow_dispatch: # Allows manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2025 # Using latest Windows runner with VS 2022

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Generate Solution with Premake
      run: |
        cd build
        ./premake5.exe vs2022

    - name: Build Solution
      run: |
        msbuild EchoesOfSlumber.sln /p:Configuration=Release /p:Platform=x64

    - name: Prepare Artifacts
      run: |
        mkdir release_build
        copy bin\Release\EchoesOfSlumber.exe release_build\
        # Copy necessary DLLs if any (SDL3, etc. are usually static but check your config)
        if (Test-Path "bin\Release\*.dll") { copy bin\Release\*.dll release_build\ }
        # Copy assets
        xcopy /E /I assets release_build\assets
        # Copy config.xml
        xcopy config.xml release_build\
        # Create ZIP
        Compress-Archive -Path release_build\* -DestinationPath EchoesOfSlumber_AlphaPhase.zip

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: alpha-phase-${{ github.run_number }}
        name: Alpha Phase Release
        body: |
          Automatic build of the Alpha Phase.
          Generated from commit: ${{ github.sha }}
        draft: false
        prerelease: false
        files: EchoesOfSlumber_AlphaPhase.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
